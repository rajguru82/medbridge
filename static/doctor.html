<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedBridge — Doctor Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #eff6ff;
      --success: #059669;
      --success-light: #d1fae5;
      --warning: #d97706;
      --warning-light: #fef3c7;
      --danger: #ef4444;
      --bg: #f8fafc;
      --surface: #fff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Nav */
    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
    }
    .nav-logo { font-size: 1.3rem; font-weight: 800; color: var(--primary); }
    .nav-info  { font-size: .85rem; color: var(--muted); }
    .nav-info strong { color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .btn-logout {
      padding: 6px 14px; border: 1.5px solid var(--border);
      background: none; border-radius: 8px; cursor: pointer;
      font-size: .85rem; font-weight: 600; color: var(--muted); transition: .15s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    main { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 22px;
      box-shadow: var(--shadow);
    }
    .stat-card .num  { font-size: 2rem; font-weight: 800; color: var(--primary); }
    .stat-card .lbl  { font-size: .8rem; color: var(--muted); margin-top: 2px; font-weight: 600; }
    .stat-card.pending .num { color: var(--warning); }
    .stat-card.done    .num { color: var(--success); }

    /* Tabs */
    .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
    .tab-btn {
      flex: 1; padding: 10px; border: none; background: none;
      border-radius: 9px; cursor: pointer; font-size: .9rem; font-weight: 600;
      color: var(--muted); transition: .2s;
    }
    .tab-btn.active { background: var(--primary); color: #fff; }
    .tab-btn:hover:not(.active) { background: var(--primary-light); color: var(--primary); }

    /* Case cards */
    .case-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; box-shadow: var(--shadow);
      margin-bottom: 16px; overflow: hidden;
    }
    .case-card.pending-card { border-left: 4px solid var(--warning); }
    .case-card.done-card    { border-left: 4px solid var(--success); }

    .card-header {
      padding: 18px 20px;
      display: flex; justify-content: space-between; align-items: flex-start;
      cursor: pointer; gap: 12px; flex-wrap: wrap;
    }
    .card-header:hover { background: var(--bg); }

    .patient-name { font-size: 1rem; font-weight: 700; }
    .patient-meta { font-size: .82rem; color: var(--muted); margin-top: 3px; }
    .card-right   { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 20px;
      font-size: .75rem; font-weight: 700;
    }
    .badge-pending   { background: var(--warning-light); color: var(--warning); }
    .badge-scheduled { background: var(--primary-light);  color: var(--primary); }
    .badge-completed { background: var(--success-light);  color: var(--success); }

    .chevron { font-size: 1rem; color: var(--muted); transition: transform .2s; }
    .chevron.open { transform: rotate(180deg); }

    /* Card body */
    .card-body { display: none; padding: 0 20px 20px; border-top: 1px solid var(--border); }
    .card-body.open { display: block; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; margin-top: 16px; }
    .info-item .label { font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .info-item .value { font-size: .88rem; color: var(--text); margin-top: 2px; line-height: 1.5; }

    .ai-box {
      background: linear-gradient(135deg, #eff6ff, #f0fdf4);
      border: 1px solid #bfdbfe; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 16px;
    }
    .ai-box .ai-label { font-size: .75rem; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    .ai-box p { font-size: .88rem; line-height: 1.65; }
    .specialist-tag {
      display: inline-block; margin-top: 8px;
      background: var(--primary); color: #fff;
      padding: 3px 10px; border-radius: 20px; font-size: .77rem; font-weight: 700;
    }

    /* Response form */
    .response-form { border-top: 1px solid var(--border); padding-top: 16px; }
    .response-form label { font-size: .83rem; font-weight: 700; margin-bottom: 8px; display: block; }
    textarea {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: .9rem; outline: none; resize: vertical; min-height: 100px;
      font-family: inherit; transition: border-color .2s;
    }
    textarea:focus { border-color: var(--primary); }
    .btn {
      padding: 10px 22px; border: none; border-radius: 9px;
      font-size: .92rem; font-weight: 700; cursor: pointer; transition: .2s;
    }
    .btn-success { background: var(--success); color: #fff; margin-top: 10px; }
    .btn-success:hover { background: #047857; }
    .btn-success:disabled { opacity: .6; cursor: not-allowed; }

    /* Completed response */
    .completed-response {
      background: var(--success-light); border-radius: 8px;
      padding: 12px; border-top: 1px solid var(--border); margin-top: 16px;
    }
    .completed-response .label { font-size: .75rem; font-weight: 700; color: var(--success); margin-bottom: 4px; }
    .completed-response p { font-size: .88rem; line-height: 1.6; }

    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .spinner {
      width: 36px; height: 36px; margin: 0 auto 12px;
      border: 3px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { text-align: center; padding: 48px 0; color: var(--muted); }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }

    .alert {
      padding: 12px 16px; border-radius: 9px; font-size: .9rem;
      font-weight: 500; margin-bottom: 20px; display: none;
    }
    .alert.success { background: var(--success-light); color: #065f46; display: block; }
    .alert.error   { background: #fee2e2; color: #991b1b; display: block; }

    @media (max-width: 600px) {
      .stats-row   { grid-template-columns: 1fr 1fr; }
      .info-grid   { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">🏥 MedBridge</div>
  <div class="nav-right">
    <span class="nav-info">Dr. <strong id="nav-name">—</strong> · <span id="nav-spec">—</span></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<main>
  <div id="global-alert" class="alert"></div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="stat-total">—</div>
      <div class="lbl">Total Cases</div>
    </div>
    <div class="stat-card pending">
      <div class="num" id="stat-pending">—</div>
      <div class="lbl">Awaiting Response</div>
    </div>
    <div class="stat-card done">
      <div class="num" id="stat-done">—</div>
      <div class="lbl">Completed</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('pending')">⏳ Pending Cases</button>
    <button class="tab-btn" onclick="switchTab('completed')">✅ Completed</button>
  </div>

  <div id="tab-pending">
    <div id="pending-list"><div class="loading"><div class="spinner"></div>Loading cases…</div></div>
  </div>

  <div id="tab-completed" style="display:none">
    <div id="completed-list"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  </div>
</main>

<script>
  let queue = [];

  // ── Boot ─────────────────────────────────────────────────────────────
  (async function init() {
    const token = localStorage.getItem('mb_token');
    const role  = localStorage.getItem('mb_role');
    if (!token || role !== 'doctor') { window.location.href = '/'; return; }

    document.getElementById('nav-name').textContent = localStorage.getItem('mb_name') || '—';

    try {
      const res  = await fetch('/api/me', { headers: authHeaders() });
      const me   = await res.json();
      document.getElementById('nav-spec').textContent = me.specialty || 'Doctor';
    } catch {}

    loadQueue();
  })();

  // ── Helpers ───────────────────────────────────────────────────────────
  function authHeaders() {
    return { 'Authorization': `Bearer ${localStorage.getItem('mb_token')}`, 'Content-Type': 'application/json' };
  }

  async function api(url, method = 'GET', body = null) {
    const opts = { method, headers: authHeaders() };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    if (res.status === 401) logout();
    return res;
  }

  function logout() { localStorage.clear(); window.location.href = '/'; }

  function showAlert(type, msg) {
    const el = document.getElementById('global-alert');
    el.className = 'alert ' + type;
    el.textContent = msg;
    setTimeout(() => { el.className = 'alert'; }, 4000);
  }

  function switchTab(tab) {
    document.getElementById('tab-pending').style.display   = tab === 'pending'   ? '' : 'none';
    document.getElementById('tab-completed').style.display = tab === 'completed' ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'pending') || (i === 1 && tab === 'completed'));
    });
    if (tab === 'completed') renderCompleted();
  }

  // ── Load Queue ────────────────────────────────────────────────────────
  async function loadQueue() {
    const pendingEl   = document.getElementById('pending-list');
    const completedEl = document.getElementById('completed-list');

    pendingEl.innerHTML = '<div class="loading"><div class="spinner"></div>Loading cases…</div>';

    try {
      const res = await api('/api/doctor/queue');
      queue = await res.json();

      // Update stats
      const pending   = queue.filter(q => q.status === 'scheduled');
      const completed = queue.filter(q => q.status === 'completed');
      document.getElementById('stat-total').textContent   = queue.length;
      document.getElementById('stat-pending').textContent = pending.length;
      document.getElementById('stat-done').textContent    = completed.length;

      renderPending(pending);
      renderCompleted(completed);
    } catch {
      pendingEl.innerHTML = '<div class="empty"><p>Failed to load cases.</p></div>';
    }
  }

  function renderPending(cases) {
    const el = document.getElementById('pending-list');
    if (!cases) cases = queue.filter(q => q.status === 'scheduled');

    if (!cases.length) {
      el.innerHTML = '<div class="empty"><div class="icon">🎉</div><p>No pending cases. All caught up!</p></div>';
      return;
    }

    el.innerHTML = cases.map(c => buildCard(c, false)).join('');
  }

  function renderCompleted(cases) {
    const el = document.getElementById('completed-list');
    if (!cases) cases = queue.filter(q => q.status === 'completed');

    if (!cases.length) {
      el.innerHTML = '<div class="empty"><div class="icon">📋</div><p>No completed cases yet.</p></div>';
      return;
    }

    el.innerHTML = cases.map(c => buildCard(c, true)).join('');
  }

  function buildCard(c, isCompleted) {
    const badgeClass = isCompleted ? 'completed' : 'scheduled';
    const badgeText  = isCompleted ? 'Completed' : 'Pending';
    const caseDate   = new Date(c.case_created).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

    return `
      <div class="case-card ${isCompleted ? 'done-card' : 'pending-card'}" id="card-${c.appointment_id}">
        <div class="card-header" onclick="toggleCard(${c.appointment_id})">
          <div>
            <div class="patient-name">🧑‍⚕️ ${c.patient_name}</div>
            <div class="patient-meta">
              📍 ${c.patient_city} &nbsp;·&nbsp; Age ${c.age} &nbsp;·&nbsp;
              🕐 ${c.slot_datetime}
            </div>
          </div>
          <div class="card-right">
            <span class="badge badge-${badgeClass}">${badgeText}</span>
            <span class="chevron" id="chevron-${c.appointment_id}">▼</span>
          </div>
        </div>
        <div class="card-body" id="body-${c.appointment_id}">
          <div class="ai-box">
            <div class="ai-label">🤖 AI Clinical Summary</div>
            <p>${c.ai_summary}</p>
            <span class="specialist-tag">${c.specialist_type}</span>
          </div>

          <div class="info-grid">
            <div class="info-item">
              <div class="label">Symptoms</div>
              <div class="value">${c.symptoms}</div>
            </div>
            <div class="info-item">
              <div class="label">Medical History</div>
              <div class="value">${c.medical_history}</div>
            </div>
            <div class="info-item">
              <div class="label">Current Medications</div>
              <div class="value">${c.current_medications}</div>
            </div>
            <div class="info-item">
              <div class="label">Case Submitted</div>
              <div class="value">${caseDate}</div>
            </div>
          </div>

          ${isCompleted
            ? `<div class="completed-response">
                 <div class="label">✅ Your Consultation Notes</div>
                 <p>${c.doctor_response}</p>
               </div>`
            : `<div class="response-form">
                 <label>📝 Write Consultation Notes / Prescription</label>
                 <textarea id="resp-${c.appointment_id}" placeholder="Based on the clinical summary and symptoms, I recommend…
Diagnosis: 
Investigations advised: 
Medications: 
Follow-up: "></textarea>
                 <button class="btn btn-success" onclick="submitResponse(${c.appointment_id})">
                   ✅ Submit Consultation Response
                 </button>
               </div>`
          }
        </div>
      </div>
    `;
  }

  function toggleCard(apptId) {
    const body    = document.getElementById(`body-${apptId}`);
    const chevron = document.getElementById(`chevron-${apptId}`);
    const isOpen  = body.classList.contains('open');
    // Close all
    document.querySelectorAll('.card-body').forEach(b => b.classList.remove('open'));
    document.querySelectorAll('.chevron').forEach(c => c.classList.remove('open'));
    if (!isOpen) {
      body.classList.add('open');
      chevron.classList.add('open');
    }
  }

  async function submitResponse(apptId) {
    const text = document.getElementById(`resp-${apptId}`).value.trim();
    if (!text) { showAlert('error', 'Please write your consultation notes before submitting.'); return; }

    const btn = document.querySelector(`#card-${apptId} .btn-success`);
    btn.disabled = true; btn.textContent = 'Submitting…';

    try {
      const res = await api(`/api/appointments/${apptId}/respond`, 'PUT', { response: text });
      if (!res.ok) {
        const data = await res.json();
        showAlert('error', data.detail || 'Failed to submit response.');
        return;
      }
      showAlert('success', '✅ Consultation response submitted successfully!');
      await loadQueue();
    } catch {
      showAlert('error', 'Network error. Please try again.');
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '✅ Submit Consultation Response'; }
    }
  }
</script>
</body>
</html>
